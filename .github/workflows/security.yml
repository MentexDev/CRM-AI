name: Security

# Gate de seguridad automatizado: audita dependencias y busca secretos en cada
# push / PR. Permisos de sólo lectura y acciones pinneadas a SHA (supply chain).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # historial completo para el secret-scanning

      # ── Dependencias JS/TS ───────────────────────────────────────────
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - name: npm audit (falla en high/critical)
        run: npm audit --audit-level=high

      # ── Secret scanning ──────────────────────────────────────────────
      # Pinea a un SHA real antes de activar en prod (Settings → Actions).
      - name: Gitleaks (secretos en el código/historial)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
