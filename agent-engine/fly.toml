# Fly.io — despliegue del motor agéntico.
# Ajusta app = "<tu-nombre-unico>" antes de `fly launch --no-deploy` / `fly deploy`.
app = "crm-agent-engine"
primary_region = "gig"  # GIG = Río de Janeiro (cerca de Colombia). Cambia si prefieres.

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
